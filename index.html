    <!-- JSON-LD Structured Data: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What is DataFlow AI?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DataFlow AI is an AI-powered data automation platform that lets you build and deploy zero-code semantic pipelines using natural language. Connect 300+ integrations, orchestrate millions of records at sub-50ms latency, with SOC 2 and HIPAA compliance built in."
          }
        },
        {
          "@type": "Question",
          "name": "Do I need to write code to build pipelines?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "No. DataFlow AI's natural language AI engine lets you describe your desired transformation in plain English. The Semantic AI mapper generates, validates, and deploys the pipeline automatically — no Python, SQL, or YAML required."
          }
        },
        {
          "@type": "Question",
          "name": "How does annual billing work?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Annual billing applies a 20% discount across all plans. You are billed as a single upfront annual charge. The monthly equivalent price is displayed on our pricing page so you can compare easily. You can switch back to monthly billing at the end of your annual term."
          }
        },
        {
          "@type": "Question",
          "name": "Is DataFlow AI SOC 2 compliant?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. DataFlow AI is SOC 2 Type II certified and HIPAA compliant. All data is encrypted in transit and at rest using AES-256. Enterprise plans additionally support customer-managed encryption keys (CMEK), cell-level decryption, and comprehensive audit logs."
          }
        },
        {
          "@type": "Question",
          "name": "What integrations does DataFlow AI support?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "DataFlow AI supports 300+ native connectors including Stripe, HubSpot, Salesforce, Snowflake, PostgreSQL, MongoDB, and custom REST/GraphQL endpoints. Our semantic schema mapper handles structural mismatches automatically, eliminating manual translation layers."
          }
        }
      ]
    }
    </script>
